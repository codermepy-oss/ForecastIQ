<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForecastIQ | Intelligence Briefing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #3d0505 0%, #050505 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --accent: #ef4444;
            --suggestion-hover: rgba(255, 255, 255, 0.1);
        }

        .light-theme {
            --bg-gradient: radial-gradient(circle at center, #fce4e4 0%, #ffffff 100%);
            --glass-bg: rgba(0, 0, 0, 0.05);
            --text-main: #1a1a1a;
            --accent: #b91c1c;
            --suggestion-hover: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            background: #000;
            color: var(--text-main);
            overflow-x: hidden;
            transition: background 0.8s ease, color 0.8s ease;
        }

        #main-bg {
            position: fixed;
            inset: 0;
            background: var(--bg-gradient);
            z-index: -2;
        }

        .hello-font {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(4rem, 15vw, 6rem);
            background: linear-gradient(to right, var(--text-main), #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(139, 0, 0, 0.15);
            filter: blur(80px);
            z-index: -1;
            animation: float 25s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(120px, -120px) scale(1.1); }
        }

        .letter { display: inline-block; opacity: 0; transform: translateY(10px); }
        .letter-animate { animation: letterIn 0.4s forwards; }
        @keyframes letterIn { to { opacity: 1; transform: translateY(0); } }
        .fade-out { animation: fadeOut 0.8s forwards; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        .trust-badge {
            display: inline-flex;
            align-items: center; gap: 4px; font-size: 10px; font-weight: 800;
            color: #10b981; background: rgba(16, 185, 129, 0.1);
            padding: 4px 10px; border-radius: 100px; border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: dotPulse 1.2s infinite ease-in-out; }
        @keyframes dotPulse { 0%, 100% { transform: scale(0.6); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 1; } }
        
        #query-result { border-left: 3px solid var(--accent); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        /* Ensure suggestions are clickable and visible */
        #suggestions {
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="bg-black min-h-screen">

    <div id="main-bg"></div>
    <div class="bubble" style="width: 40vw; height: 40vw; top: -5%; left: -5%;"></div>
    <div class="bubble" style="width: 30vw; height: 30vw; bottom: 5%; right: -5%; background: rgba(50, 50, 255, 0.05);"></div>

    <div id="splash-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-black">
        <div id="hello-text" class="hello-font opacity-0 translate-y-4 transition-all duration-1000">hello</div>
        <div id="brand-load" class="hidden flex flex-col items-center text-center">
            <h1 id="splash-title" class="text-5xl md:text-7xl font-black tracking-tighter mb-4 text-white"></h1>
            <div class="flex gap-2 mb-6">
                <div class="dot" style="animation-delay:0s"></div>
                <div class="dot" style="animation-delay:0.2s"></div>
                <div class="dot" style="animation-delay:0.4s"></div>
            </div>
            <p id="splash-tagline" class="text-gray-400 font-light opacity-0 transition-opacity duration-1000 px-4">Smarter forecasts, powered by AI</p>
        </div>
    </div>

    <div id="dashboard" class="hidden opacity-0 transition-opacity duration-1000 max-w-4xl mx-auto px-4 md:px-6 py-8 relative z-10">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl md:text-2xl font-black">FORECAST<span class="text-red-600">IQ</span></h2>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="text-[10px] font-bold uppercase tracking-widest opacity-50 hover:opacity-100 transition-opacity">Toggle Theme</button>
                <div class="trust-badge">● SATELLITE VERIFIED</div>
            </div>
        </div>

        <div id="search-section" class="glass p-6 md:p-10 text-center mb-8 relative z-[50]">
            <h3 class="text-lg md:text-xl font-light mb-6 opacity-60 italic">"What's the atmosphere like in..."</h3>
            <div class="relative max-w-lg mx-auto">
                <div class="flex items-center bg-white/5 border border-white/10 rounded-2xl px-4 py-1 focus-within:border-red-500 transition-all">
                    <input type="text" id="city-input" autocomplete="off" oninput="handleSearchInput(this.value)" placeholder="Search city..." 
                           class="flex-grow bg-transparent border-none px-2 py-4 outline-none text-white text-lg">
                </div>
                <div id="suggestions" class="absolute w-full mt-2 glass hidden z-[60]"></div>
            </div>
        </div>

        <div id="weather-engine" class="hidden">
            <div class="grid grid-cols-2 gap-3 mb-8">
                <div class="glass p-4 md:p-6 text-center border-b-2 border-red-500/20">
                    <span class="text-[9px] uppercase tracking-widest opacity-50 block mb-1">Temperature</span>
                    <span class="text-xl md:text-3xl font-bold" id="grid-temp">--</span>
                </div>
                <div class="glass p-4 md:p-6 text-center">
                    <span class="text-[9px] uppercase tracking-widest opacity-50 block mb-1">Humidity</span>
                    <span class="text-xl md:text-3xl font-bold" id="grid-hum">--</span>
                </div>
                <div class="glass p-4 md:p-6 text-center">
                    <span class="text-[9px] uppercase tracking-widest opacity-50 block mb-1">Rain Status</span>
                    <span class="text-xl md:text-3xl font-bold" id="grid-rain">--</span>
                </div>
                <div class="glass p-4 md:p-6 text-center">
                    <span class="text-[9px] uppercase tracking-widest opacity-50 block mb-1">Purity of Air</span>
                    <span class="text-xl md:text-3xl font-bold" id="grid-air">Nominal</span>
                </div>
            </div>

            <div class="glass p-6 md:p-8 mb-8">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold tracking-widest text-blue-400 uppercase">Gemini Neural link active</span>
                </div>
                <p id="ai-text" class="text-base md:text-lg italic leading-relaxed min-h-[4em] opacity-80"></p>
                <button onclick="resetLocation()" class="mt-4 text-[10px] uppercase font-bold text-red-500 tracking-widest">Change Location</button>
            </div>

            <div class="glass p-6 md:p-8 mb-20">
                <p class="text-[10px] font-bold text-gray-500 mb-4 tracking-[0.3em] uppercase">Ask Gemini!</p>
                <div class="flex flex-col gap-4">
                    <input type="text" id="user-query" placeholder="Can I go for a walk?" 
                           class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 outline-none focus:border-blue-500 transition-all">
                    <div id="query-result" class="hidden text-sm p-5 rounded-2xl bg-white/5 mb-2 leading-relaxed"></div>
                    <button onclick="askAI()" class="self-end text-xs font-black text-red-500 hover:tracking-widest transition-all uppercase">Analyze →</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 🔑 CONFIGURATION ---
        const GEMINI_KEY = "YOUR_GEMINI_API_KEY"; 
        const WEATHER_KEY = "YOUR_OPEN_WEATHER_KEY";
        
        let weatherStore = null;
        let searchTimeout;

        // --- 🌊 BOOT SEQUENCE ---
        window.onload = () => {
            const hello = document.getElementById('hello-text');
            const brandLoad = document.getElementById('brand-load');
            const splashTitle = document.getElementById('splash-title');
            
            setTimeout(() => { hello.style.opacity = '1'; hello.style.transform = 'translateY(0)'; }, 500);

            setTimeout(() => {
                hello.classList.add('fade-out');
                setTimeout(() => {
                    brandLoad.classList.remove('hidden');
                    "ForecastIQ".split('').forEach((l, i) => {
                        const span = document.createElement('span');
                        span.innerText = l;
                        span.className = 'letter';
                        span.style.animationDelay = `${i * 0.08}s`;
                        splashTitle.appendChild(span);
                        setTimeout(() => span.classList.add('letter-animate'), 50);
                    });
                    setTimeout(() => document.getElementById('splash-tagline').style.opacity = '1', 1000);
                }, 800);
            }, 2200);

            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').remove();
                    document.getElementById('dashboard').classList.remove('hidden');
                    setTimeout(() => {
                        document.getElementById('dashboard').style.opacity = '1';
                        // Check memory
                        const saved = localStorage.getItem('forecastIQ_city');
                        if (saved) document.getElementById('city-input').value = saved;
                    }, 50);
                }, 1000);
            }, 6500);
        };

        // --- 🔍 CITY SEARCH LOGIC ---
        async function handleSearchInput(query) {
            const box = document.getElementById('suggestions');
            if (query.length < 2) { box.classList.add('hidden'); return; }

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${query}&limit=5&appid=${WEATHER_KEY}`);
                    const locs = await res.json();
                    renderSuggestions(locs);
                } catch (e) { console.error("Search Error:", e); }
            }, 300);
        }

        function renderSuggestions(locs) {
            const box = document.getElementById('suggestions');
            box.innerHTML = '';
            if (!locs || locs.length === 0) { box.classList.add('hidden'); return; }
            
            box.classList.remove('hidden');
            locs.forEach(l => {
                const item = document.createElement('div');
                item.className = "px-6 py-4 hover:bg-[var(--suggestion-hover)] cursor-pointer border-b border-white/5 text-left text-sm transition-colors";
                item.innerHTML = `<strong>${l.name}</strong>, ${l.state ? l.state + ', ' : ''}${l.country}`;
                
                // Mousedown is used to prevent the input "blur" from hiding the box before click registers
                item.onmousedown = (e) => {
                    e.preventDefault();
                    selectCity(l.lat, l.lon, l.name);
                };
                box.appendChild(item);
            });
        }

        async function selectCity(lat, lon, name) {
            document.getElementById('city-input').value = name;
            document.getElementById('suggestions').classList.add('hidden');
            await fetchWeather(lat, lon, name);
        }

        // --- ☁️ WEATHER ENGINE ---
        async function fetchWeather(lat, lon, name) {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${WEATHER_KEY}`);
                weatherStore = await res.json();
                weatherStore.name = name;
                
                // Update Grid
                document.getElementById('grid-temp').innerText = `${Math.round(weatherStore.main.temp)}°C`;
                document.getElementById('grid-hum').innerText = `${weatherStore.main.humidity}%`;
                document.getElementById('grid-rain').innerText = weatherStore.weather[0].main;

                localStorage.setItem('forecastIQ_city', weatherStore.name);
                document.getElementById('search-section').classList.add('hidden');
                document.getElementById('weather-engine').classList.remove('hidden');
                
                generateBrief();
            } catch (e) { alert("Data Sync Failed."); }
        }

        async function generateBrief() {
            const aiEl = document.getElementById('ai-text');
            const prompt = `Explain the weather in ${weatherStore.name}: ${weatherStore.main.temp}°C and ${weatherStore.weather[0].description}. Be a trustable AI expert. 25 words max.`;
            aiEl.innerText = "Analyzing atmospheric data...";
            const response = await callGemini(prompt);
            typeEffect(aiEl, response);
        }

        async function askAI() {
            const qInput = document.getElementById('user-query');
            const resBox = document.getElementById('query-result');
            if(!qInput.value) return;

            resBox.classList.remove('hidden');
            resBox.style.opacity = "0.5";
            resBox.innerText = "Thinking...";
            
            const prompt = `User asks: "${qInput.value}". Context: ${weatherStore.main.temp}°C in ${weatherStore.name}. Use a reliable, helpful tone. Max 40 words.`;
            const answer = await callGemini(prompt);
            
            qInput.value = ""; 
            resBox.style.opacity = "1";
            typeEffect(resBox, answer);
        }

        async function callGemini(prompt) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const json = await res.json();
                return json.candidates[0].content.parts[0].text;
            } catch (e) { return "Intelligence link offline."; }
        }

        // --- 🛠️ UTILITIES ---
        function typeEffect(element, text) {
            element.innerHTML = ""; let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) { element.innerHTML += text.charAt(i); i++; } 
                else { clearInterval(timer); }
            }, 20);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        function resetLocation() {
            document.getElementById('weather-engine').classList.add('hidden');
            document.getElementById('search-section').classList.remove('hidden');
        }

        // Hide suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#search-section')) {
                document.getElementById('suggestions').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
